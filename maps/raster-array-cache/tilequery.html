<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>single raster-array layer</title>
  <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.17.0/mapbox-gl.css" rel="stylesheet">
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.17.0/mapbox-gl.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@turf/turf@7/turf.min.js"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
    }

    #map {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 100%;
    }

    #feature-list {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 1;
      max-height: calc(100% - 20px);
      width: 240px;
      overflow-y: auto;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 4px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.2);
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      font-size: 13px;
    }

    #feature-list .header {
      padding: 8px 12px;
      font-weight: bold;
      border-bottom: 1px solid #eee;
    }

    #feature-list ul {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    #feature-list li {
      padding: 6px 12px;
      border-bottom: 1px solid #f0f0f0;
      background: rgba(63, 177, 206, 0.12);
      border-left: 3px solid #3FB1CE;
      padding-left: 9px;
    }

    #feature-list li:last-child {
      border-bottom: none;
    }

    #feature-list li.matched {
      background: rgba(229, 57, 53, 0.12);
      border-left-color: #e53935;
      font-weight: bold;
    }

    #feature-list .empty {
      padding: 8px 12px;
      color: #888;
    }

    #radius-control {
      position: absolute;
      top: 10px;
      left: 300px;
      z-index: 1;
      padding: 8px 12px;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 4px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.2);
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #radius-control input {
      width: 160px;
    }

    #radius-value {
      min-width: 32px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    #request-info {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 1;
      width: 420px;
      max-height: calc(100% - 20px);
      display: flex;
      flex-direction: column;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 4px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.2);
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      font-size: 12px;
    }

    #request-info .section-header {
      padding: 6px 12px;
      font-weight: bold;
      border-bottom: 1px solid #eee;
      font-size: 12px;
    }

    #request-url {
      padding: 8px 12px;
      border-bottom: 1px solid #eee;
      word-break: break-all;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, monospace;
      font-size: 11px;
      color: #333;
      max-height: 120px;
      overflow-y: auto;
    }

    #response-json {
      padding: 8px 12px;
      margin: 0;
      overflow: auto;
      flex: 1;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, monospace;
      font-size: 11px;
      color: #333;
      white-space: pre;
      max-height: 50vh;
    }

    #request-info .empty {
      padding: 8px 12px;
      color: #888;
    }
  </style>
</head>

<body>
  <div id="map"></div>
  <div id="radius-control">
    <label for="radius-slider">radius</label>
    <input id="radius-slider" type="range" min="0" max="100" step="10" value="100">
    <span id="radius-value">100</span>
    <span>m</span>
  </div>
  <div id="feature-list">
    <div class="header">Features</div>
    <div class="empty">Click on the map</div>
  </div>
  <div id="request-info">
    <div class="section-header">Request URL</div>
    <div id="request-url" class="empty">Click on the map</div>
    <div class="section-header">Response JSON</div>
    <pre id="response-json" class="empty">Click on the map</pre>
  </div>

  <script>
    const token = 'pk.eyJ1IjoianRvZ2FzaGkiLCJhIjoiY21pcGcwemUyMDR4ODNoc2EyNXhiZHpoYSJ9.RO3RqSrLbOPj_Zrt5Aocqg';
    const style = 'mapbox://styles/jtogashi/cmnwyemxi007301svhvgz0r1v';

    mapboxgl.accessToken = token;

    const map = new mapboxgl.Map({
      container: 'map',
      style: style,
      center: [135.548, 35.881],
      zoom: 5.5,
      hash: true
    });

    map.setLanguage('ja');

    const markers = new Set();
    let centerMarker = null;
    const featureListEl = document.getElementById('feature-list');
    const radiusSliderEl = document.getElementById('radius-slider');
    const radiusValueEl = document.getElementById('radius-value');
    const requestUrlEl = document.getElementById('request-url');
    const responseJsonEl = document.getElementById('response-json');
    radiusSliderEl.addEventListener('input', () => {
      radiusValueEl.textContent = radiusSliderEl.value;
    });

    const emptyFc = { type: 'FeatureCollection', features: [] };
    map.on('load', () => {
      map.addSource('radius-circle', { type: 'geojson', data: emptyFc });
      map.addLayer({
        id: 'radius-circle-fill',
        type: 'fill',
        source: 'radius-circle',
        paint: {
          'fill-color': '#888',
          'fill-opacity': 0.15
        }
      });
      map.addLayer({
        id: 'radius-circle-line',
        type: 'line',
        source: 'radius-circle',
        paint: {
          'line-color': '#555',
          'line-width': 1.5
        }
      });
    });

    const formatDistance = (distance) => `${(Math.floor(distance * 100) / 100).toFixed(2)} m`;

    const renderFeatureList = (features) => {
      featureListEl.textContent = '';

      const header = document.createElement('div');
      header.className = 'header';
      header.textContent = 'Features';
      featureListEl.appendChild(header);

      if (features.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'empty';
        empty.textContent = 'No features found';
        featureListEl.appendChild(empty);
        return;
      }

      const ul = document.createElement('ul');
      const sorted = [...features].sort((a, b) => a.distance - b.distance);
      sorted.forEach(({ name, matched, distance }) => {
        const li = document.createElement('li');
        li.textContent = `${name} (${formatDistance(distance)})`;
        if (matched) {
          li.classList.add('matched');
        }
        ul.appendChild(li);
      });
      featureListEl.appendChild(ul);
    };

    map.on('click', (e) => {
      // Skip when the click landed on an existing marker, so its popup can toggle.
      const target = e.originalEvent.target;
      for (const marker of markers) {
        if (marker.getElement().contains(target)) {
          return;
        }
      }

      markers.forEach(marker => {
        marker.remove();
      });
      markers.clear();

      const lng = e.lngLat.lng;
      const lat = e.lngLat.lat;
      const radius = Number(radiusSliderEl.value);

      if (centerMarker) {
        centerMarker.remove();
      }
      centerMarker = new mapboxgl.Marker({ color: '#888' })
        .setLngLat([lng, lat])
        .addTo(map);

      const circleSource = map.getSource('radius-circle');
      if (circleSource) {
        circleSource.setData(radius > 0
          ? turf.circle([lng, lat], radius, { units: 'meters', steps: 96 })
          : emptyFc);
      }

      const limit = 50;
      const layers = 'poi_label';
      const geometry = 'point';
      const url = `https://api.mapbox.com/v4/mapbox.mapbox-streets-v8/tilequery/${lng},${lat}.json?radius=${radius}&limit=${limit}&layers=${layers}&access_token=${token}`;
      requestUrlEl.classList.remove('empty');
      requestUrlEl.textContent = url;
      responseJsonEl.classList.remove('empty');
      responseJsonEl.textContent = 'Loading...';
      const matchTypes = ['Mall', 'Department store', 'Communications tower', 'Castle', 'Zoo', 'Townhall'];
      fetch(url).then(response => {
        response.json().then(json => {
          responseJsonEl.textContent = JSON.stringify(json, null, 2);
          const features = json.features
            .map(feature => ({
              name: feature.properties.name,
              coordinates: feature.geometry.coordinates,
              matched: matchTypes.includes(feature.properties.type),
              distance: feature.properties.tilequery.distance
            }))
            .filter(({ name }) => name);

          features.forEach(({ name, coordinates, matched, distance }) => {
            const marker = new mapboxgl.Marker({ color: matched ? '#e53935' : '#3FB1CE' })
              .setLngLat(coordinates)
              .setPopup(new mapboxgl.Popup({ offset: 25 }).setText(`${name} (${formatDistance(distance)})`))
              .addTo(map);
            markers.add(marker);
          });

          renderFeatureList(features);
        });
      });

      // const found = new Set();
      // const closeDistinctFeatures = map.querySourceFeatures('composite', {
      //   sourceLayer: 'poi_label'
      // }).filter(feature => {
      //   // filter out far POIs
      //   const distance = turf.distance(turf.point([e.lngLat.lng, e.lngLat.lat]), turf.point(feature.geometry.coordinates));
      //   if (distance > 0.1) {
      //     return false;
      //   }

      //   // deduplicate by feature ID
      //   if (found.has(feature.id)) {
      //     return false;
      //   }

      //   // cache feature ID
      //   found.add(feature.id);
      //   return true;
      // });

      // closeDistinctFeatures.forEach(feature => {
      //   const prop = feature.properties;
      //   const coord = feature.geometry.coordinates;
      //   console.log(`${prop.name} (${prop.type}) at ${coord}`);

      //   const color = ['Mall', 'Department store'].includes(prop.type) ? '#FF0000' : '#0000FF';
      //   const marker = new mapboxgl.Marker({
      //     color: color
      //   })
      //     .setLngLat(coord)
      //     .addTo(map);

      //   markers.add(marker);
      // });
    });
  </script>

</body>

</html>
